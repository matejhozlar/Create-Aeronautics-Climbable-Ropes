name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Get version
        id: version
        run: echo "value=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: Extract bundled Simulated jar
        run: |
          ./gradlew extractSimulated
          ls -la build/extracted-simulated/ || true
          test -f build/extracted-simulated/simulated.jar

      - name: Build with Gradle
        run: ./gradlew build

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          version: ${{ steps.version.outputs.value }}
          version-type: release
          name: "[${{ steps.version.outputs.value }}] create-aeronautics-climbable-ropes"
          changelog-file: CHANGELOG.md
          loaders: neoforge
          game-versions: 1.21.1
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          java: 21

          curseforge-id: 1528764
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          version: ${{ steps.version.outputs.value }}
          version-type: release
          name: "[${{ steps.version.outputs.value }}] create-aeronautics-climbable-ropes"
          changelog-file: CHANGELOG.md
          loaders: neoforge
          game-versions: 1.21.1
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          java: 21

          modrinth-id: jImqv1M5
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
